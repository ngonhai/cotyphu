<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Boardwalk Night — play Monopoly-style online with friends</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ LOBBY ============ -->
  <section id="screen-lobby" class="screen active">
    <div class="lobby-card">
      <div class="lobby-dice">⚀ ⚅</div>
      <h1 class="lobby-title">Boardwalk Night</h1>
      <p class="lobby-sub">A free, browser-based board game night for you and your friends.</p>

      <div class="tabs">
        <button class="tab-btn active" data-tab="create">Create a room</button>
        <button class="tab-btn" data-tab="join">Join a room</button>
      </div>

      <div class="tab-panel active" id="tab-create">
        <label for="input-name-create">Your name</label>
        <input type="text" id="input-name-create" maxlength="16" placeholder="e.g. Heist">
        <label for="select-max-players">Max players</label>
        <select id="select-max-players">
          <option value="4">4</option>
          <option value="5" selected>5</option>
          <option value="6">6</option>
          <option value="8">8</option>
        </select>
        <button class="btn btn-block" id="btn-create-room">Create Room</button>
      </div>

      <div class="tab-panel" id="tab-join">
        <label for="input-name-join">Your name</label>
        <input type="text" id="input-name-join" maxlength="16" placeholder="e.g. Heist">
        <label for="input-room-code">Room code</label>
        <input type="text" id="input-room-code" maxlength="5" placeholder="e.g. K7QXP" style="text-transform:uppercase">
        <button class="btn btn-block" id="btn-join-room">Join Room</button>
      </div>
    </div>
  </section>

  <!-- ============ WAITING ROOM ============ -->
  <section id="screen-waiting" class="screen">
    <div class="waiting-card">
      <div class="room-code-box">
        <div class="label">Room Code — share this link or code</div>
        <div class="code" id="room-code-display">-----</div>
      </div>
      <div id="waiting-count"></div>
      <ul id="waiting-players"></ul>
      <button class="btn btn-block" id="btn-start-game">Start Game</button>
      <p id="waiting-hint" class="muted" style="text-align:center;">Waiting for the host to start the game…</p>
      <button class="btn btn-secondary btn-block" id="btn-leave-waiting">Leave</button>
    </div>
  </section>

  <!-- ============ GAME ============ -->
  <section id="screen-game" class="screen">
    <div class="game-header">
      <h2>🎲 Boardwalk Night — Room <span id="game-room-code-label"></span></h2>
      <div class="header-actions">
        <button class="icon-btn" id="btn-properties" style="display:none;">My Properties</button>
        <button class="icon-btn" id="btn-leave-game">Leave</button>
      </div>
    </div>
    <div id="winner-banner"></div>
    <div class="game-body">
      <div class="board-wrap">
        <div id="board"></div>
      </div>
      <div class="side-panel">
        <div id="player-panel"></div>
        <div class="dice-tray" style="justify-content:center; margin: 8px 12px 0;">
          <span class="die" id="die1">⚀</span>
          <span class="die" id="die2">⚀</span>
        </div>
        <div id="action-bar"></div>
        <div id="log-panel"></div>
      </div>
    </div>
  </section>

  <!-- ============ MODAL ============ -->
  <div id="modal"></div>
  <div id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/board-data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // simple tab switching on the lobby screen
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
